name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-assure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install validation dependencies
        run: python -m pip install -r scripts/requirements.txt
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cache-version: 2
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Build publication manifest
        run: python scripts/build_publication_manifest.py
      - name: Build production site
        run: bundle exec jekyll build --trace --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Validate complete publication
        run: python scripts/validate_publication.py --baseurl "${{ steps.pages.outputs.base_path }}"
      - name: Write deployment evidence
        run: |
          mkdir -p _site/assets artifacts/pages
          printf '{\n  "repository": "%s",\n  "commit": "%s",\n  "specification_version": "0.9.0"\n}\n' \
            "${{ github.repository }}" "${{ github.sha }}" > _site/assets/build-info.json
      - name: Publish assurance summary
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          r=json.load(open('artifacts/pages/publication-assurance.json'))
          print('## GitHub Pages assurance report')
          for k in ('source_pages','rendered_html_pages','internal_references_checked','fragment_references_checked','local_assets_checked','mermaid_pages'):
              print(f'- {k.replace("_"," ").title()}: {r[k]}')
          print(f'- Published commit: `${{ github.sha }}`')
          PY
      - name: Upload publication evidence
        uses: actions/upload-artifact@v5
        with:
          name: github-pages-assurance
          path: artifacts/pages/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-assure
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
