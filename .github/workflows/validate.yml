name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install validation dependencies
        run: python -m pip install -r scripts/requirements.txt
      - name: Run release validation
        run: make release-check
      - name: Upload interoperability evidence
        uses: actions/upload-artifact@v5
        with:
          name: arpa-v0.9.0-evidence
          path: |
            artifacts/interoperability/
            conformance/reports/reference-implementation-report.json
  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r scripts/requirements.txt
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cache-version: 2
      - name: Build and validate complete GitHub Pages site
        run: make pages-check
      - name: Upload publication evidence
        uses: actions/upload-artifact@v5
        with:
          name: github-pages-assurance
          path: artifacts/pages/
